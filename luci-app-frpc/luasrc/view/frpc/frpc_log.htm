<style>
.frpc-log-wrap { margin-top: 8px; }
.frpc-log-wrap .log-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
.frpc-log-wrap .log-toolbar .cbi-button { font-size: 12px; }
.frpc-log-wrap .log-hint { font-size: 12px; color: #666; }
.frpc-log-wrap textarea { width: 100%; box-sizing: border-box; font-family: monospace; font-size: 13px; line-height: 1.5; }
</style>

<fieldset class="cbi-section" id="_log_fieldset">
	<legend><%:日志输出%></legend>
	<div class="frpc-log-wrap">
		<div class="log-toolbar">
			<div>
				<span class="log-hint"><%:2秒自动刷新%></span>
			</div>
			<input class="cbi-button cbi-button-reset" type="button" value="<%:清空日志%>" onclick="clear_log()" />
		</div>
		<textarea id="log_textarea" class="cbi-input-textarea" style="height:500px" readonly="readonly" wrap="off"></textarea>
		<p class="log-hint" style="margin-top:6px"><%:若日志时间显示不对，例如：与上海时间相差8小时，请安装 zoneinfo-asia 软件包，然后重启设备%></p>
	</div>
</fieldset>

<script type="text/javascript">
	//<![CDATA[
	function clear_log() {
		XHR.get('<%=url([[admin]], [[services]], [[frpc]], [[clear_log]])%>', null,
			function(x) { if (x && x.status == 200) { var el = document.getElementById('log_textarea'); if (el) el.value = ''; } }
		);
	}
	var _scrolled = false;
	XHR.poll(2, '<%=url([[admin]], [[services]], [[frpc]], [[get_log]])%>', null,
		function(x) {
			if (x && x.status == 200) {
				var el = document.getElementById('log_textarea');
				if (!el) return;
				el.value = (x.responseText || '').replace(/\u001b/g, '');
				if (!_scrolled) { el.scrollTop = el.scrollHeight; _scrolled = true; }
			}
		}
	);
	//]]>
</script>
