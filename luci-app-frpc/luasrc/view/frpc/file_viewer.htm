<style>
.cbi-section-config {
  border: 1px solid #e2e8f0 !important;
  border-radius: 12px !important;
  padding: 0 !important;
  background: #fff;
  overflow: hidden;
}
.cbi-section-config .config-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;
  flex-wrap: wrap; gap: 8px;
}
.cbi-section-config .config-path {
  font-size: 12px; color: #64748b; font-family: 'SF Mono', monospace;
}
.cbi-section-config .config-toolbar .cbi-button {
  padding: 6px 14px; font-size: 12px; font-weight: 500;
  border-radius: 8px; cursor: pointer; border: 1px solid #e2e8f0;
  background: #fff; color: #475569;
}
.cbi-section-config .config-toolbar .cbi-button:hover { background: #f1f5f9; }
.cbi-section-config .config-toolbar .cbi-button.copied { background: #dcfce7; color: #16a34a; border-color: #bbf7d0; }
.cbi-section-config .config-body {
  background: #0f172a; padding: 0;
}
.cbi-section-config .config-textarea {
  font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Courier New', monospace;
  font-size: 13px; line-height: 1.65; color: #34d399;
  background: transparent; border: 0; outline: 0; resize: vertical;
  width: 100%; padding: 16px; box-sizing: border-box;
}
.cbi-section-config .config-hint {
  padding: 10px 16px; font-size: 12px; color: #94a3b8;
  border-top: 1px solid #e2e8f0; background: #fafafa;
}
</style>

<fieldset class="cbi-section cbi-section-config">
	<div class="config-toolbar">
		<span class="config-path">/var/etc/frpc/frpc.main.toml</span>
		<input class="cbi-button" id="copy_btn" type="button" value="<%:复制%>" onclick="copyConfig()" />
	</div>
	<div class="config-body">
		<textarea class="config-textarea" id="config_content" readonly="readonly" wrap="off" rows="<%=content and content:cmatch("\n")+1 or 10%>"><%=content:pcdata()%></textarea>
	</div>
	<div class="config-hint">
		<%:只有启用服务后才能生成配置文件%>
	</div>
</fieldset>

<script type="text/javascript">
	//<![CDATA[
	function copyConfig() {
		var el = document.getElementById('config_content');
		if (!el) return;
		var btn = document.getElementById('copy_btn');
		el.select();
		try {
			document.execCommand('copy');
			if (btn) {
				btn.value = '<%:已复制%>';
				btn.classList.add('copied');
				setTimeout(function(){ btn.value = '<%:复制%>'; btn.classList.remove('copied'); }, 2000);
			}
		} catch(e) {}
	}
	//]]>
</script>
